<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo | Industria Khanauky</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/khanauky.css">
  <style>
    .hero-catalogo { background: linear-gradient(160deg, var(--azul-profundo), var(--azul-marca)); color: white; padding: 130px 0 50px; text-align: center; }
    .hero-catalogo h1 { color: white; }
    .aviso-visitante { background: #FFF4E5; border: 1px solid #F3CB8C; color: #8A5A12; border-radius: var(--r-md); padding: 14px 18px; }

    .tarjeta-producto { background: var(--blanco); border: 1px solid var(--borde-suave); border-radius: var(--r-card); overflow: hidden; height: 100%; transition: var(--tr); }
    .tarjeta-producto:hover { box-shadow: var(--shadow-media); transform: translateY(-4px); }
    .tarjeta-producto .img-producto { height: 170px; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: #ffffff; }
    .tarjeta-producto .cuerpo { padding: 22px; }

    .panel-carrito { position: fixed; top: 0; right: -400px; width: 380px; max-width: 92vw; height: 100vh; background: var(--blanco); box-shadow: -8px 0 24px rgba(0,0,0,0.15); transition: right 0.3s ease; display: flex; flex-direction: column; z-index: 1100; }
    .panel-carrito.abierto { right: 0; }
    .carrito-header { background: var(--azul-profundo); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .carrito-items { flex: 1; padding: 18px 20px; overflow-y: auto; }
    .item-carrito { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde-suave); padding: 12px 0; gap: 10px; }
    .controles-cantidad { display: flex; align-items: center; gap: 8px; }
    .btn-cant { background: var(--fondo); border: none; color: var(--azul-profundo); width: 26px; height: 26px; border-radius: 6px; font-weight: bold; }
    .carrito-footer { padding: 20px; background: var(--fondo); border-top: 1px solid var(--borde-suave); }
    .overlay-carrito { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 1050; opacity: 0; pointer-events: none; transition: var(--tr); }
    .overlay-carrito.abierto { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <div id="navbarSlot"></div>

  <section class="hero-catalogo">
    <div class="container">
      <h1>Catálogo de productos</h1>
      <p class="mb-0" style="color:rgba(255,255,255,0.85)">Agua Aquaelis y hielo Aquaelis Ice, con precios especiales por volumen.</p>
    </div>
  </section>

  <main class="container py-5">
    <div class="aviso-visitante mb-4 d-none" id="mensajeNoLogueado">
      <i class="bi bi-info-circle-fill me-2"></i>
      Puedes ver nuestro catálogo libremente. Para agregar productos al carrito y realizar pedidos,
      <a href="login.html" class="fw-bold">inicia sesión aquí</a>.
    </div>

    <div class="row g-4" id="contenedorProductos">
      <!-- Las tarjetas de producto se generan dinámicamente desde la API -->
    </div>
  </main>

  <button class="btn-khanauky-acento position-fixed d-flex align-items-center gap-2" style="bottom:24px; right:24px; z-index:1000;" id="btnAbrirCarrito">
    <i class="bi bi-cart3"></i> Carrito (<span id="contadorCarrito">0</span>)
  </button>

  <div class="overlay-carrito" id="overlayCarrito"></div>
  <aside class="panel-carrito" id="carritoLateral">
    <div class="carrito-header">
      <h5 class="mb-0">Tu pedido</h5>
      <button class="btn-close btn-close-white" id="btnCerrarCarrito" aria-label="Cerrar carrito"></button>
    </div>
    <div class="carrito-items" id="listaCarrito">
      <p class="text-center text-mid mt-4">El carrito está vacío.</p>
    </div>
    <div class="carrito-footer">
      <div class="d-flex justify-content-between fw-bold fs-5 mb-3" style="color:var(--azul-profundo)">
        <span>Total a pagar:</span> <span id="totalCarrito">S/ 0.00</span>
      </div>
      <button class="btn-khanauky-primario w-100" id="btnProcederPago">Proceder al pago</button>
    </div>
  </aside>

  <div id="footerSlot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>inicializarLayout();</script>
  <script src="js/menu.js"></script>
</body>
</html>
