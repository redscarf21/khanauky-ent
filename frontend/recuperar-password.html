<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña | Industria Khanauky</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/khanauky.css">
  <style>
    body { background: linear-gradient(160deg, var(--azul-profundo) 0%, #133f59 55%, var(--azul-marca) 100%); min-height: 100vh; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 110px 16px 60px; }
    .card-rec { background: var(--blanco); border-radius: var(--r-card); box-shadow: var(--shadow-media); width: 100%; max-width: 460px; padding: 2.6rem; }
  </style>
</head>
<body>
  <div id="navbarSlot"></div>

  <div class="wrap">
    <div class="card-rec">
      <i class="bi bi-key text-azul-marca fs-2 mb-2 d-block"></i>
      <h2>Recupera tu contraseña</h2>
      <p class="text-mid small mb-4">Ingresa el correo con el que te registraste. Te enviaremos un enlace para crear una nueva contraseña.</p>

      <form id="formRecuperar">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" required placeholder="tu@correo.com">
        </div>
        <button type="submit" class="btn-khanauky-primario w-100">Enviar enlace de recuperación</button>
        <p id="mensaje" class="small mt-3 mb-0"></p>
      </form>

      <div class="text-center mt-3">
        <a href="login.html" class="small"><i class="bi bi-arrow-left"></i> Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

  <div id="footerSlot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>inicializarLayout();</script>
  <script>
    document.getElementById("formRecuperar").addEventListener("submit", async (e) => {
      e.preventDefault();
      const mensaje = document.getElementById("mensaje");
      const email = document.getElementById("email").value.trim();
      mensaje.className = "small mt-3 mb-0 text-mid";
      mensaje.textContent = "Enviando...";
      try {
        const data = await Api.post("/api/recuperar-password", { email });
        mensaje.className = "small mt-3 mb-0 text-success fw-semibold";
        mensaje.textContent = data.mensaje;
      } catch (err) {
        mensaje.className = "small mt-3 mb-0 text-danger fw-semibold";
        mensaje.textContent = err.message;
      }
    });
  </script>
</body>
</html>
