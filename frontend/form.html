<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar pedido | Industria Khanauky</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/khanauky.css">
  <style>
    body { padding-top: 90px; }
    .resumen-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--borde-suave); font-size: 0.95rem; }
    .fila-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.25rem; color: var(--azul-profundo); }
    .empty-msg { text-align: center; color: var(--texto-suave); font-style: italic; }
    .aviso-entrega { border-radius: var(--r-md); padding: 14px 16px; font-size: 0.88rem; margin-bottom: 18px; display: flex; gap: 10px; align-items: flex-start; }
    .aviso-recojo { background: #FFF4E5; color: #8A5A12; }
    .aviso-delivery { background: #E3F2FD; color: #1565C0; }
  </style>
</head>
<body>
  <div id="navbarSlot"></div>

  <main class="container py-5" style="max-width: 680px;">
    <a href="menu.html" class="d-inline-flex align-items-center gap-1 text-mid small mb-4">
      <i class="bi bi-arrow-left"></i> Volver al catálogo
    </a>

    <div class="card-khanauky p-4 p-md-5">
      <h4 class="mb-3">1. Resumen de tu pedido</h4>
      <div id="resumenProductos"></div>
      <div class="bg-fondo-suave rounded p-3 my-3">
        <div class="fila-total"><span>Total a pagar:</span> <span id="totalFinal">S/ 0.00</span></div>
      </div>
      <div id="avisoEntrega"></div>

      <h4 class="mb-3 mt-4">2. Datos de envío</h4>
      <form id="formularioPedido">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre de quien recibe</label>
            <input type="text" class="form-control" id="nombre" required placeholder="Ej. Juan Pérez">
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono de contacto</label>
            <input type="tel" class="form-control" id="telefono" pattern="[0-9]{9}" required placeholder="987654321">
          </div>
          <div class="col-12">
            <label class="form-label">Dirección exacta</label>
            <input type="text" class="form-control" id="direccion" required placeholder="Calle, número, referencia">
          </div>
          <div class="col-md-6">
            <label class="form-label">Sucursal de despacho</label>
            <select class="form-select" id="sucursal" required></select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Método de pago</label>
            <select class="form-select" id="pago" required>
              <option value="Efectivo al recibir">Efectivo (al recibir)</option>
              <option value="Yape / Plin">Yape / Plin</option>
              <option value="Transferencia">Transferencia bancaria</option>
            </select>
          </div>
        </div>

        <div class="form-check mt-4">
          <input class="form-check-input" type="checkbox" id="quiereFactura">
          <label class="form-check-label small" for="quiereFactura">Necesito factura (con RUC) en vez de boleta</label>
        </div>
        <div class="row g-3 mt-1 d-none" id="bloqueFactura">
          <div class="col-md-6">
            <label class="form-label">RUC</label>
            <input type="text" class="form-control" id="ruc" maxlength="11">
          </div>
          <div class="col-md-6">
            <label class="form-label">Razón social</label>
            <input type="text" class="form-control" id="razonSocial">
          </div>
        </div>

        <button type="submit" class="btn-khanauky-primario w-100 mt-4" id="btnConfirmar">Confirmar y enviar pedido</button>
      </form>
    </div>
  </main>

  <div id="footerSlot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>inicializarLayout();</script>
  <script src="js/form.js"></script>
</body>
</html>
