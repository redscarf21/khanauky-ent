<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta | Industria Khanauky</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/khanauky.css">
  <style>
    body { background: linear-gradient(160deg, var(--azul-profundo) 0%, #133f59 55%, var(--azul-marca) 100%); min-height: 100vh; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 110px 16px 60px; }
    .card-reg { background: var(--blanco); border-radius: var(--r-card); box-shadow: var(--shadow-media); width: 100%; max-width: 560px; padding: 2.6rem; }
    .error-text { color: #C53030; font-size: 0.88rem; font-weight: 600; min-height: 18px; }
  </style>
</head>
<body>
  <div id="navbarSlot"></div>

  <div class="wrap">
    <div class="card-reg">
      <div class="text-center mb-4">
        <i class="bi bi-droplet-fill text-azul-marca fs-2"></i>
        <h2 class="mb-1">Crea tu cuenta</h2>
        <p class="text-mid small mb-0">Regístrate para empezar a pedir agua y hielo Aquaelis.</p>
      </div>

      <form id="registroForm" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre *</label>
            <input type="text" class="form-control" id="nombre" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellidos *</label>
            <input type="text" class="form-control" id="apellidos" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Usuario *</label>
            <input type="text" class="form-control" id="usuario" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Contraseña *</label>
            <input type="password" class="form-control" id="pass" required minlength="6">
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirmar contraseña *</label>
            <input type="password" class="form-control" id="passConfirmar" required minlength="6">
          </div>
          <div class="col-md-6">
            <label class="form-label">DNI *</label>
            <input type="text" class="form-control" id="dni" maxlength="8" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Correo electrónico *</label>
            <input type="email" class="form-control" id="email" required>
          </div>

          <div class="col-12">
            <label class="form-label">Fecha de nacimiento</label>
            <div class="d-flex gap-2">
              <select id="dia" class="form-select"><option>Día</option></select>
              <select id="mes" class="form-select"><option>Mes</option></select>
              <select id="anio" class="form-select"><option>Año</option></select>
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Teléfono *</label>
            <input type="text" class="form-control" id="tel" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Dirección *</label>
            <input type="text" class="form-control" id="dir" required>
          </div>
        </div>

        <button type="submit" class="btn-khanauky-primario w-100 mt-4">Crear mi cuenta</button>
        <p id="error-msg" class="error-text mt-2 mb-0"></p>

        <p class="small text-mid text-center mt-3 mb-0">
          Al crear tu cuenta, aceptas nuestras condiciones de uso y nuestra política de privacidad.
        </p>
        <p class="small text-center mt-2 mb-0">
          ¿Ya tienes cuenta? <a href="login.html" class="fw-bold">Inicia sesión</a>
        </p>
      </form>
    </div>
  </div>

  <div id="footerSlot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>inicializarLayout();</script>
  <script src="js/registro.js"></script>
</body>
</html>
