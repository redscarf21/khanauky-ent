<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar correo | Industria Khanauky</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/khanauky.css">
  <style>
    body { background: linear-gradient(160deg, var(--azul-profundo) 0%, #133f59 55%, var(--azul-marca) 100%); min-height: 100vh; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 110px 16px 60px; }
    .card-ver { background: var(--blanco); border-radius: var(--r-card); box-shadow: var(--shadow-media); width: 100%; max-width: 460px; padding: 2.6rem; text-align: center; }
  </style>
</head>
<body>
  <div id="navbarSlot"></div>

  <div class="wrap">
    <div class="card-ver">
      <div id="icono" class="fs-1 mb-3"><i class="bi bi-hourglass-split text-azul-marca"></i></div>
      <h2 id="titulo">Verificando tu correo...</h2>
      <p id="mensaje" class="text-mid">Esto tomará solo un momento.</p>
      <a href="login.html" id="botonLogin" class="btn-khanauky-primario mt-2 d-none">Ir a iniciar sesión</a>
    </div>
  </div>

  <div id="footerSlot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>inicializarLayout();</script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const icono = document.getElementById("icono");
    const titulo = document.getElementById("titulo");
    const mensaje = document.getElementById("mensaje");
    const botonLogin = document.getElementById("botonLogin");

    async function verificar() {
      if (!token) {
        icono.innerHTML = '<i class="bi bi-x-circle text-danger"></i>';
        titulo.textContent = "Enlace inválido";
        mensaje.textContent = "No encontramos un token de verificación en el enlace.";
        return;
      }
      try {
        const data = await Api.post("/api/verificar-email", { token });
        icono.innerHTML = '<i class="bi bi-check-circle text-success"></i>';
        titulo.textContent = "¡Correo verificado!";
        mensaje.textContent = data.mensaje;
        botonLogin.classList.remove("d-none");
      } catch (err) {
        icono.innerHTML = '<i class="bi bi-x-circle text-danger"></i>';
        titulo.textContent = "No pudimos verificar tu correo";
        mensaje.textContent = err.message;
      }
    }
    verificar();
  </script>
</body>
</html>
