<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña | Industria Khanauky</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/khanauky.css">
  <style>
    body { background: linear-gradient(160deg, var(--azul-profundo) 0%, #133f59 55%, var(--azul-marca) 100%); min-height: 100vh; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 110px 16px 60px; }
    .card-rec { background: var(--blanco); border-radius: var(--r-card); box-shadow: var(--shadow-media); width: 100%; max-width: 460px; padding: 2.6rem; }
  </style>
</head>
<body>
  <div id="navbarSlot"></div>

  <div class="wrap">
    <div class="card-rec">
      <i class="bi bi-shield-lock text-azul-marca fs-2 mb-2 d-block"></i>
      <h2>Crea una nueva contraseña</h2>
      <p class="text-mid small mb-4">Elige una contraseña segura de al menos 6 caracteres.</p>

      <form id="formRestablecer">
        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" class="form-control" id="nuevaPass" required minlength="6" placeholder="••••••••">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="confirmarPass" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-khanauky-primario w-100">Guardar nueva contraseña</button>
        <p id="mensaje" class="small mt-3 mb-0"></p>
      </form>
    </div>
  </div>

  <div id="footerSlot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>inicializarLayout();</script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const mensaje = document.getElementById("mensaje");

    if (!token) {
      mensaje.className = "small mt-3 mb-0 text-danger fw-semibold";
      mensaje.textContent = "Enlace inválido. Solicita uno nuevo desde la página de recuperación.";
      document.getElementById("formRestablecer").querySelector("button").disabled = true;
    }

    document.getElementById("formRestablecer").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nuevaPass = document.getElementById("nuevaPass").value;
      const confirmarPass = document.getElementById("confirmarPass").value;

      if (nuevaPass !== confirmarPass) {
        mensaje.className = "small mt-3 mb-0 text-danger fw-semibold";
        mensaje.textContent = "Las contraseñas no coinciden.";
        return;
      }

      try {
        const data = await Api.post("/api/restablecer-password", { token, nuevaPass });
        mensaje.className = "small mt-3 mb-0 text-success fw-semibold";
        mensaje.textContent = data.mensaje + " Redirigiendo...";
        setTimeout(() => (window.location.href = "login.html"), 1800);
      } catch (err) {
        mensaje.className = "small mt-3 mb-0 text-danger fw-semibold";
        mensaje.textContent = err.message;
      }
    });
  </script>
</body>
</html>
