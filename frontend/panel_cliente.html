<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi perfil | Industria Khanauky</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/khanauky.css">
  <style>
    body { padding-top: 90px; }
    .hero-perfil { background: linear-gradient(160deg, var(--azul-profundo), var(--azul-marca)); color: white; padding: 50px 0; }
    .hero-perfil h2 { color: white; margin-bottom: 4px; }
    .badge-estado { padding: 6px 14px; border-radius: var(--r-pill); font-size: 0.78rem; font-weight: 700; }
    .estado-Venta-Registrada { background: #FDECEC; color: #C53030; }
    .estado-Venta-Exitosa { background: #E6F4EA; color: #2E7D32; }
    .estado-Entrega-Pendiente { background: #E3F2FD; color: #1565C0; }
    .estado-Venta-Entregada { background: #F3E8FD; color: #7B1FA2; }
    .pedido-card { border: 1px solid var(--borde-suave); border-radius: var(--r-md); padding: 18px 20px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div id="navbarSlot"></div>

  <section class="hero-perfil">
    <div class="container">
      <h2 id="nombreCliente">Cargando...</h2>
      <p class="mb-0" style="color:rgba(255,255,255,0.85)">Bienvenido a tu panel. Aquí puedes pedir agua, hielo y revisar tu historial.</p>
    </div>
  </section>

  <main class="container py-5">
    <div class="d-flex flex-wrap gap-3 mb-4">
      <a href="menu.html" class="btn-khanauky-acento"><i class="bi bi-box-seam me-1"></i> Ir al catálogo y hacer pedido</a>
      <button id="btnCerrarSesion" class="btn btn-outline-danger rounded-pill px-4">Cerrar sesión</button>
    </div>

    <h4 class="mb-3">Mis pedidos recientes</h4>
    <div id="listaPedidos">
      <p class="text-mid">Cargando historial...</p>
    </div>
  </main>

  <div id="footerSlot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>inicializarLayout();</script>
  <script src="js/panel_cliente.js"></script>
</body>
</html>
